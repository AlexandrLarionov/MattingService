<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Remover — AI Demo</title>
    <meta name="description" content="Удаление фона с изображений с помощью нейросетей ONNX">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ========== Design Tokens ========== */
        :root {
            --bg-primary: #0a0a0f;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-hover: rgba(255, 255, 255, 0.07);
            --bg-glass: rgba(255, 255, 255, 0.06);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-active: rgba(139, 92, 246, 0.5);
            --text-primary: #f0f0f5;
            --text-secondary: #8b8b9e;
            --text-muted: #5a5a6e;
            --accent-primary: #8b5cf6;
            --accent-secondary: #6366f1;
            --accent-glow: rgba(139, 92, 246, 0.25);
            --gradient-accent: linear-gradient(135deg, #8b5cf6, #6366f1, #4f46e5);
            --gradient-bg: radial-gradient(ellipse at 20% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(99, 102, 241, 0.06) 0%, transparent 50%);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.15);
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* ========== Reset & Base ========== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: var(--gradient-bg);
            pointer-events: none;
            z-index: 0;
        }

        /* ========== Layout ========== */
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px 60px;
        }

        /* ========== Header ========== */
        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .header__badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 100px;
            background: var(--bg-glass);
            border: 1px solid var(--border-subtle);
            font-size: 12px;
            font-weight: 500;
            color: var(--accent-primary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .header__badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        .header h1 {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1.1;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 30%, var(--accent-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header__subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            font-weight: 400;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.5;
        }

        /* ========== Mode Selector ========== */
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .mode-btn {
            position: relative;
            padding: 12px 28px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-subtle);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            outline: none;
        }

        .mode-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .mode-btn.active {
            background: rgba(139, 92, 246, 0.12);
            border-color: var(--border-active);
            color: var(--accent-primary);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.1);
        }

        .mode-btn__label {
            display: block;
            font-size: 13px;
            font-weight: 600;
        }

        .mode-btn__desc {
            display: block;
            font-size: 11px;
            opacity: 0.6;
            margin-top: 3px;
        }

        /* ========== Drop Zone ========== */
        .dropzone {
            position: relative;
            border: 2px dashed var(--border-subtle);
            border-radius: var(--radius-xl);
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-smooth);
            background: var(--bg-card);
            overflow: hidden;
        }

        .dropzone::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.05) 0%, transparent 70%);
            opacity: 0;
            transition: opacity var(--transition-smooth);
        }

        .dropzone:hover,
        .dropzone.drag-over {
            border-color: var(--accent-primary);
            background: var(--bg-card-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .dropzone:hover::before,
        .dropzone.drag-over::before {
            opacity: 1;
        }

        .dropzone__icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            border-radius: var(--radius-lg);
            background: var(--bg-glass);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform var(--transition-smooth);
        }

        .dropzone:hover .dropzone__icon {
            transform: scale(1.08);
        }

        .dropzone__icon svg {
            width: 28px;
            height: 28px;
            stroke: var(--accent-primary);
            stroke-width: 1.5;
            fill: none;
        }

        .dropzone__title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .dropzone__hint {
            font-size: 13px;
            color: var(--text-muted);
        }

        .dropzone__hint strong {
            color: var(--accent-primary);
            cursor: pointer;
        }

        #file-input {
            display: none;
        }

        /* ========== Processing Overlay ========== */
        .processing {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 60px 40px;
        }

        .processing.active {
            display: flex;
        }

        .spinner {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 3px solid var(--border-subtle);
            border-top-color: var(--accent-primary);
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .processing__text {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .processing__time {
            font-size: 13px;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }

        /* ========== Results ========== */
        .results {
            display: none;
            margin-top: 40px;
            animation: fadeInUp 0.5s ease;
        }

        .results.active {
            display: block;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .results__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .results__title {
            font-size: 20px;
            font-weight: 700;
        }

        .results__meta {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            gap: 16px;
        }

        .results__meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .compare-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .compare-card {
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border-subtle);
            background: var(--bg-card);
        }

        .compare-card__label {
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .compare-card__label::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .compare-card:first-child .compare-card__label::before {
            background: var(--text-muted);
        }

        .compare-card:last-child .compare-card__label::before {
            background: #22c55e;
        }

        .compare-card__img-wrap {
            position: relative;
            aspect-ratio: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            max-height: 500px;
        }

        .compare-card__img-wrap img {
            max-width: 100%;
            max-height: 500px;
            object-fit: contain;
        }

        /* Checkerboard pattern for transparency */
        .compare-card:last-child .compare-card__img-wrap {
            background-image:
                linear-gradient(45deg, #1a1a2e 25%, transparent 25%),
                linear-gradient(-45deg, #1a1a2e 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #1a1a2e 75%),
                linear-gradient(-45deg, transparent 75%, #1a1a2e 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
            background-color: #12121f;
        }

        /* ========== Preview State ========== */
        .preview {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            animation: fadeInUp 0.4s ease;
        }

        .preview.active {
            display: flex;
        }

        .preview__img-wrap {
            width: 100%;
            max-height: 340px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
        }

        .preview__img-wrap img {
            max-width: 100%;
            max-height: 340px;
            object-fit: contain;
        }

        .preview__filename {
            font-size: 13px;
            color: var(--text-muted);
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .preview__actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* ========== Action Buttons ========== */
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all var(--transition-fast);
            text-decoration: none;
        }

        .btn--primary {
            background: var(--gradient-accent);
            color: #fff;
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.3);
        }

        .btn--primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(139, 92, 246, 0.4);
        }

        .btn--secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
        }

        .btn--secondary:hover {
            background: var(--bg-card-hover);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .btn svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        /* ========== Error Toast ========== */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            padding: 14px 24px;
            border-radius: var(--radius-md);
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transition: transform var(--transition-smooth);
            backdrop-filter: blur(12px);
            max-width: 500px;
            text-align: center;
        }

        .toast.visible {
            transform: translateX(-50%) translateY(0);
        }

        /* ========== Responsive ========== */
        @media (max-width: 768px) {
            .app-container {
                padding: 24px 16px 40px;
            }

            .header h1 {
                font-size: 28px;
            }

            .mode-selector {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
                max-width: 320px;
                margin-left: auto;
                margin-right: auto;
            }

            .compare-container {
                grid-template-columns: 1fr;
            }

            .dropzone {
                padding: 40px 20px;
            }

            .actions {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1>Сервис для удаления фона с изображения</h1>
            <p class="header__subtitle">
                Выполнил Ларионов А. в качестве тестового задания
            </p>
        </header>

        <!-- Mode Selector -->
        <div class="mode-selector" id="mode-selector">
            <button class="mode-btn active" data-mode="birefnet" id="mode-fast">
                <span class="mode-btn__label">BiRefNet</span>
                <span class="mode-btn__desc">Одноэтапный, универсальный</span>
            </button>
            <button class="mode-btn" data-mode="ben2+sam2matting" id="mode-quality">
                <span class="mode-btn__label">BEN2 + SAM2</span>
                <span class="mode-btn__desc">Двухэтапный, лучше на портретах</span>
            </button>
        </div>

        <!-- Drop Zone -->
        <div class="dropzone" id="dropzone">
            <div class="dropzone__icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="17 8 12 3 7 8" />
                    <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
            </div>
            <p class="dropzone__title">Перетащите изображение сюда</p>
            <p class="dropzone__hint">или <strong id="browse-trigger">выберите файл</strong> · JPG, PNG, WebP · до 20 МБ
            </p>
            <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp">
        </div>

        <!-- Preview (after file select, before processing) -->
        <div class="preview" id="preview">
            <div class="preview__img-wrap">
                <img id="preview-img" alt="Preview">
            </div>
            <p class="preview__filename" id="preview-filename"></p>
            <div class="preview__actions">
                <button class="btn btn--primary" id="run-btn">
                    <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    Начать обработку
                </button>
                <button class="btn btn--secondary" id="cancel-btn">
                    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    Отмена
                </button>
            </div>
        </div>

        <!-- Processing -->
        <div class="processing" id="processing">
            <div class="spinner"></div>
            <p class="processing__text">Удаляем фон…</p>
            <p class="processing__time" id="processing-time">0.0 с</p>
        </div>

        <!-- Results -->
        <div class="results" id="results">
            <div class="results__header">
                <h2 class="results__title">Результат</h2>
                <div class="results__meta">
                    <span id="result-mode">—</span>
                    <span id="result-time">—</span>
                </div>
            </div>

            <div class="compare-container">
                <div class="compare-card">
                    <div class="compare-card__label">Оригинал</div>
                    <div class="compare-card__img-wrap">
                        <img id="original-img" alt="Original image">
                    </div>
                </div>
                <div class="compare-card">
                    <div class="compare-card__label">Без фона</div>
                    <div class="compare-card__img-wrap">
                        <img id="result-img" alt="Result image">
                    </div>
                </div>
            </div>

            <div class="actions">
                <a class="btn btn--primary" id="download-btn" download>
                    <svg viewBox="0 0 24 24">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Скачать PNG
                </a>
                <button class="btn btn--secondary" id="new-upload-btn">
                    <svg viewBox="0 0 24 24">
                        <polyline points="23 4 23 10 17 10" />
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
                    </svg>
                    Загрузить ещё
                </button>
            </div>
        </div>
    </div>

    <!-- Error Toast -->
    <div class="toast" id="toast"></div>

    <script>
        (function () {
            'use strict';

            // DOM elements
            const dropzone = document.getElementById('dropzone');
            const fileInput = document.getElementById('file-input');
            const browseTrig = document.getElementById('browse-trigger');
            const preview = document.getElementById('preview');
            const previewImg = document.getElementById('preview-img');
            const previewFilename = document.getElementById('preview-filename');
            const runBtn = document.getElementById('run-btn');
            const cancelBtn = document.getElementById('cancel-btn');
            const processing = document.getElementById('processing');
            const procTime = document.getElementById('processing-time');
            const results = document.getElementById('results');
            const originalImg = document.getElementById('original-img');
            const resultImg = document.getElementById('result-img');
            const downloadBtn = document.getElementById('download-btn');
            const newUploadBtn = document.getElementById('new-upload-btn');
            const resultMode = document.getElementById('result-mode');
            const resultTime = document.getElementById('result-time');
            const toast = document.getElementById('toast');
            const modeSelector = document.getElementById('mode-selector');

            let selectedMode = 'birefnet';
            let timerInterval = null;
            let pendingFile = null;

            // ---- Mode selection ----
            modeSelector.addEventListener('click', (e) => {
                const btn = e.target.closest('.mode-btn');
                if (!btn) return;
                modeSelector.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedMode = btn.dataset.mode;
            });

            // ---- Drag & Drop ----
            dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropzone.classList.add('drag-over');
            });

            dropzone.addEventListener('dragleave', () => {
                dropzone.classList.remove('drag-over');
            });

            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropzone.classList.remove('drag-over');
                const files = e.dataTransfer.files;
                if (files.length > 0) selectFile(files[0]);
            });

            // ---- Click to browse ----
            browseTrig.addEventListener('click', (e) => {
                e.stopPropagation();
                fileInput.click();
            });

            dropzone.addEventListener('click', () => {
                fileInput.click();
            });

            fileInput.addEventListener('change', () => {
                if (fileInput.files.length > 0) selectFile(fileInput.files[0]);
            });

            // ---- New upload ----
            newUploadBtn.addEventListener('click', resetUI);

            // ---- Run button ----
            runBtn.addEventListener('click', () => {
                if (pendingFile) processFile(pendingFile);
            });

            // ---- Cancel button ----
            cancelBtn.addEventListener('click', resetUI);

            // ---- Select file (show preview) ----
            function selectFile(file) {
                const allowed = ['image/jpeg', 'image/png', 'image/webp'];
                if (!allowed.includes(file.type)) {
                    showToast('Формат не поддерживается. Допустимые: JPG, PNG, WebP.');
                    return;
                }
                if (file.size > 20 * 1024 * 1024) {
                    showToast('Файл слишком большой. Максимум: 20 МБ.');
                    return;
                }

                pendingFile = file;
                const url = URL.createObjectURL(file);
                previewImg.src = url;
                originalImg.src = url;
                previewFilename.textContent = file.name;

                dropzone.style.display = 'none';
                results.classList.remove('active');
                preview.classList.add('active');
            }

            // ---- Process file (send to backend) ----
            function processFile(file) {
                preview.classList.remove('active');
                processing.classList.add('active');

                // Start timer
                let startTime = performance.now();
                timerInterval = setInterval(() => {
                    const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
                    procTime.textContent = elapsed + ' с';
                }, 100);

                const formData = new FormData();
                formData.append('file', file);
                formData.append('mode', selectedMode);

                fetch('/api/remove-bg', {
                    method: 'POST',
                    body: formData,
                })
                    .then(response => {
                        if (!response.ok) {
                            return response.json().then(err => { throw new Error(err.detail || 'Ошибка сервера'); });
                        }
                        const serverTime = response.headers.get('X-Processing-Time');
                        return response.blob().then(blob => ({ blob, serverTime }));
                    })
                    .then(({ blob, serverTime }) => {
                        clearInterval(timerInterval);
                        processing.classList.remove('active');

                        const resultURL = URL.createObjectURL(blob);
                        resultImg.src = resultURL;

                        downloadBtn.href = resultURL;
                        const baseName = file.name.replace(/\.[^.]+$/, '');
                        downloadBtn.download = `${baseName}_removed_bg.png`;

                        const modeLabels = {
                            'birefnet': 'BiRefNet',
                            'ben2+sam2matting': 'BEN2 + SAM2',
                        };
                        resultMode.textContent = modeLabels[selectedMode] || selectedMode;
                        resultTime.textContent = serverTime ? `⏱ ${serverTime} с` : '';

                        results.classList.add('active');
                    })
                    .catch(err => {
                        clearInterval(timerInterval);
                        processing.classList.remove('active');
                        preview.classList.add('active');
                        showToast(err.message);
                    });
            }

            // ---- Reset ----
            function resetUI() {
                results.classList.remove('active');
                processing.classList.remove('active');
                preview.classList.remove('active');
                dropzone.style.display = '';
                fileInput.value = '';
                pendingFile = null;

                // Revoke URLs
                if (previewImg.src.startsWith('blob:')) URL.revokeObjectURL(previewImg.src);
                if (originalImg.src.startsWith('blob:')) URL.revokeObjectURL(originalImg.src);
                if (resultImg.src.startsWith('blob:')) URL.revokeObjectURL(resultImg.src);
            }

            // ---- Toast ----
            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('visible');
                setTimeout(() => toast.classList.remove('visible'), 4000);
            }
        })();
    </script>
</body>

</html>
